<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Timer</title>
    <link rel="stylesheet" href="../css/style_exercise6.css" />
  </head>
  <body>
    <h1>Temporizador</h1>
    <section id="timerSection" class="timerSection">
      <div class="timer-controls">
        <button class="btn-timer btn-start" id="btn-timer">Start</button>
        <button class="btn-timer btn-stop" id="btn-stop" disabled>Stop</button>
        <button class="btn-timer btn-reset" id="btn-reset" disabled>
          Reset
        </button>
      </div>
      <p id="timerDisplay" class="timerDisplay">00:00:00</p>
    </section>
    <script src="../js/js_exercise_6.js"></script>
  </body>
</html>
