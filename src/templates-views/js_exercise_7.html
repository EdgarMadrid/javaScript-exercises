<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Password Generator</title>
    <link rel="stylesheet" href="../css/style_exercise7.css" />
  </head>
  <body>
    <h1>Generador de Contraseñas</h1>
    <section class="generator-container" id="generator-container">
      <div class="generator-controls">
        <label for="length">Longitud de la Contraseña:</label>
        <input type="number" id="length" min="4" max="20" />
        <button id="generate-button">Generar Contraseña</button>
      </div>
      <div class="generator-result">
        <h2>Contraseña Generada:</h2>
        <p id="password-result"></p>
      </div>
    </section>

    <script src="../js/js_exercise_7.js"></script>
  </body>
</html>
