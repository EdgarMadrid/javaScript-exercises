<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lista de tareas guardadas en localStorage</title>
    <link rel="stylesheet" href="../css/style_exercise9.css" />
  </head>
  <body>
    <h1>Lista de tareas</h1>
    <form id="task-form" class="task-form">
      <input
        type="text"
        id="task-input"
        placeholder="Ingrese una tarea"
        required
      />
      <button type="submit">Agregar</button>
    </form>
    <ul id="task-list" class="task-list"></ul>

    <button id="deleteall-btn" class="deleteall-btn">
      Eliminar todas las tareas
    </button>

    <script src="../js/js_exercise_9.js"></script>
  </body>
</html>
