<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lista Dinamica</title>
    <link rel="stylesheet" href="../css/style_exercise3.css" />
  </head>
  <body>
    <h1>Lista Dinámica</h1>
    <main class="list-container">
      <section class="input-section">
        <article>
          <input type="text" id="itemInput" placeholder="Ingrese un elemento" />
          <button id="addItemButton">Agregar</button>
        </article>
      </section>

      <section class="display-section">
        <h2>Lista de Elementos</h2>
        <ul id="displayList"></ul>
      </section>
    </main>

    <script src="../js/js_exercise_3.js"></script>
  </body>
</html>
